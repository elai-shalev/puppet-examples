---
package_name: haproxy
config_dir: /etc/haproxy
config_file: /etc/haproxy/haproxy.cfg
service_name: haproxy
user: haproxy
group: haproxy
stats_enabled: true
stats_port: 9000
stats_uri: /haproxy-stats
stats_user: admin
stats_password: "{{ vault_haproxy_stats_password | default('changeme') }}"
global_maxconn: 4096
client_timeout: 30s
server_timeout: 30s
connect_timeout: 5s
retries: 3
ssl_enabled: false
ssl_cert_path: /etc/ssl/certs
ssl_key_path: /etc/ssl/private
ssl_ciphers: ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
ssl_min_version: TLSv1.2
log_server: 127.0.0.1
log_facility: local0
log_level: info
extra_packages: []
firewall_provider: ufw
backends:
  webservers:
    balance: roundrobin
    port: 8080
    health_check: httpchk GET /health
    health_interval: 5s
    servers:
      - name: web1
        address: 10.0.1.10
        weight: 100
      - name: web2
        address: 10.0.1.11
        weight: 100
      - name: web3
        address: 10.0.1.12
        weight: 100
  api:
    balance: leastconn
    port: 3000
    health_check: httpchk GET /api/health
    health_interval: 10s
    servers:
      - name: api1
        address: 10.0.2.10
        weight: 100
      - name: api2
        address: 10.0.2.11
        weight: 100
stick_table_enabled: false
stick_table_size: 200k
stick_table_expire: 30m
