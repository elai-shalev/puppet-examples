---
controller_credential_types:
- name: HAProxy Statistics
  description: Credential type for HAProxy Statistics
  kind: cloud
  inputs:
    fields:
    - id: stats_user
      type: string
      label: Statistics Username
      help_text: Username for accessing the HAProxy statistics interface
    - id: stats_password
      type: string
      label: Statistics Password
      secret: true
      help_text: Password for accessing the HAProxy statistics interface
    required:
    - stats_user
    - stats_password
  injectors:
    extra_vars:
      stats_user: !unsafe '{{ stats_user }}'
      stats_password: !unsafe '{{ stats_password }}'
- name: HAProxy SSL Certificate
  description: Credential type for HAProxy SSL Certificate
  kind: cloud
  inputs:
    fields:
    - id: ssl_cert_path
      type: string
      label: SSL Certificate Path
      help_text: Path to the SSL certificate file for HTTPS termination
    - id: ssl_key_path
      type: string
      label: SSL Key Path
      help_text: Path to the SSL private key file for HTTPS termination
    required:
    - ssl_cert_path
    - ssl_key_path
  injectors:
    extra_vars:
      ssl_cert_path: !unsafe '{{ ssl_cert_path }}'
      ssl_key_path: !unsafe '{{ ssl_key_path }}'
