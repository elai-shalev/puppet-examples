---
- name: Install HAProxy package
  ansible.builtin.package:
    name: "{{ package_name }}"
    state: present
- name: Install extra packages if defined
  ansible.builtin.package:
    name: "{{ extra_packages }}"
    state: present
  when: extra_packages is defined and extra_packages|length > 0
- name: Ensure HAProxy group exists
  ansible.builtin.group:
    name: "{{ group }}"
    system: true
    state: present
- name: Ensure HAProxy user exists
  ansible.builtin.user:
    name: "{{ user }}"
    group: "{{ group }}"
    home: /var/lib/haproxy
    shell: /sbin/nologin
    system: true
    state: present
- name: Create HAProxy configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ group }}"
    mode: "0755"
  loop:
    - "{{ config_dir }}"
    - "{{ config_dir }}/conf.d"
- name: Create HAProxy data directory
  ansible.builtin.file:
    path: /var/lib/haproxy
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0750"
