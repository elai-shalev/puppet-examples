- name: Verify
  hosts: all
  gather_facts: false
  tasks:
  - name: Check HAProxy main config file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/haproxy/haproxy.cfg
    register: haproxy_config
  - name: Assert HAProxy config file was created
    ansible.builtin.assert:
      that:
      - haproxy_config.stat.exists
      - haproxy_config.stat.size > 0
      fail_msg: HAProxy config file not found or empty
      success_msg: HAProxy config file exists and has content
  - name: Check HAProxy conf.d directory exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/haproxy/conf.d
    register: confd_dir
  - name: Assert conf.d directory was created
    ansible.builtin.assert:
      that:
      - confd_dir.stat.exists
      - confd_dir.stat.isdir
      fail_msg: HAProxy conf.d directory not found
      success_msg: HAProxy conf.d directory exists
  - name: Check HAProxy errors directory exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/haproxy/errors
    register: errors_dir
  - name: Assert errors directory was created
    ansible.builtin.assert:
      that:
      - errors_dir.stat.exists
      - errors_dir.stat.isdir
      fail_msg: HAProxy errors directory not found
      success_msg: HAProxy errors directory exists
  - name: Check backend configuration files exist
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/haproxy/conf.d/{{ item }}.cfg
    register: backend_configs
    loop:
    - webservers
    - api
    - internal_monitoring
    - stick-tables
  - name: Assert backend config files were created
    ansible.builtin.assert:
      that:
      - item.stat.exists
      - item.stat.size > 0
      fail_msg: Backend config file {{ item.item }} not found or empty
      success_msg: Backend config file {{ item.item }} exists and has content
    loop: '{{ backend_configs.results }}'
    loop_control:
      label: '{{ item.item }}'
  - name: Check error pages exist
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/haproxy/errors/{{ item }}.http
    register: error_pages
    loop:
    - '503'
    - '408'
  - name: Assert error pages were created
    ansible.builtin.assert:
      that:
      - item.stat.exists
      - item.stat.size > 0
      fail_msg: Error page {{ item.item }} not found or empty
      success_msg: Error page {{ item.item }} exists and has content
    loop: '{{ error_pages.results }}'
    loop_control:
      label: '{{ item.item }}'
  - name: Get HAProxy config content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/haproxy/haproxy.cfg
    register: haproxy_config_content
  - name: Assert HAProxy config contains expected sections
    ansible.builtin.assert:
      that:
      - '''global'' in (haproxy_config_content.content | b64decode)'
      - '''defaults'' in (haproxy_config_content.content | b64decode)'
      - '''frontend http_front'' in (haproxy_config_content.content | b64decode)'
      - '''listen stats'' in (haproxy_config_content.content | b64decode)'
      fail_msg: HAProxy config missing expected sections
      success_msg: HAProxy config contains all expected sections
  - name: Get webservers backend config content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/haproxy/conf.d/webservers.cfg
    register: webservers_config
  - name: Assert webservers backend config contains expected content
    ansible.builtin.assert:
      that:
      - '''backend webservers'' in (webservers_config.content | b64decode)'
      - '''balance roundrobin'' in (webservers_config.content | b64decode)'
      - '''option httpchk GET /health'' in (webservers_config.content | b64decode)'
      - '''server web1'' in (webservers_config.content | b64decode)'
      - '''server web2'' in (webservers_config.content | b64decode)'
      - '''server web3'' in (webservers_config.content | b64decode)'
      fail_msg: Webservers backend config missing expected content
      success_msg: Webservers backend config contains expected content
  - name: Get API backend config content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/haproxy/conf.d/api.cfg
    register: api_config
  - name: Assert API backend config contains expected content
    ansible.builtin.assert:
      that:
      - '''backend api'' in (api_config.content | b64decode)'
      - '''balance leastconn'' in (api_config.content | b64decode)'
      - '''option httpchk GET /api/health'' in (api_config.content | b64decode)'
      - '''server api1'' in (api_config.content | b64decode)'
      - '''server api2'' in (api_config.content | b64decode)'
      fail_msg: API backend config missing expected content
      success_msg: API backend config contains expected content
  - name: Get internal monitoring backend config content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/haproxy/conf.d/internal_monitoring.cfg
    register: monitoring_config
  - name: Assert internal monitoring backend config contains expected content
    ansible.builtin.assert:
      that:
      - '''backend internal_monitoring'' in (monitoring_config.content | b64decode)'
      - '''balance roundrobin'' in (monitoring_config.content | b64decode)'
      - '''option httpchk GET /-/healthy'' in (monitoring_config.content | b64decode)'
      - '''server prom1-fra'' in (monitoring_config.content | b64decode)'
      fail_msg: Internal monitoring backend config missing expected content
      success_msg: Internal monitoring backend config contains expected content
  - name: Check HAProxy service status
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert HAProxy service is running
    ansible.builtin.assert:
      that:
      - '''haproxy.service'' in ansible_facts.services'
      - ansible_facts.services['haproxy.service'].state == 'running'
      - ansible_facts.services['haproxy.service'].status == 'enabled'
      fail_msg: HAProxy service not running or not enabled
      success_msg: HAProxy service is running and enabled
    tags: molecule-notest
  - name: Check HAProxy ports
    ansible.builtin.wait_for:
      port: '{{ item }}'
      timeout: 5
    loop:
    - 80
    - 443
    - 9000
    tags: molecule-notest
  - name: Check HAProxy stats page
    ansible.builtin.uri:
      url: http://localhost:9000/haproxy-stats
      user: admin
      password: changeme
      force_basic_auth: true
      status_code: 200
    tags: molecule-notest
